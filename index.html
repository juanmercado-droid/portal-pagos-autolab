function h(tag, props = {}, children = []) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(props || {})) {
    if (v == null) continue;
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k === 'checked' || k === 'disabled' || k === 'value') el[k] = v;
    else el.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach((c) => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(c) : c);
  });
  return el;
}

function formatMoney(n) { return (Number(n) || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 }); }
function formatDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' }); }
function daysUntil(d) { if (!d) return null; return Math.round((new Date(d).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000); }
function uid(p) { return `${p}_${Math.random().toString(36).slice(2, 9)}`; }
function addDays(dateStr, days) { const d = new Date(dateStr); d.setDate(d.getDate() + days); return d.toISOString().slice(0, 10); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const api = {
  async get() {
    const res = await fetch(APPS_SCRIPT_URL);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'No se pudo leer la información del Sheet.');
    return json.data;
  },
  async post(accion, payload) {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ accion, ...payload }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Ocurrió un problema al guardar.');
    return json;
  },
};

function montoSugerido(provider, ciclo, registros) {
  if (!ciclo) return 0;
  if (provider.esquema === 'fijo') return Number(provider.montoFijo) || 0;
  const suma = registros.filter((r) => r.cicloId === ciclo.id).reduce((a, r) => a + Number(r.monto || 0), 0);
  if (provider.esquema === 'variable_con_tope') return Math.min(suma, Number(provider.tope) || 0);
  return suma;
}

function MiniCalendar(events = []) {
  const wrap = h('div', {});
  let cursor = (() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); })();

  function renderBody() {
    clear(wrap);
    const year = cursor.getFullYear(), month = cursor.getMonth();
    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayKey = todayStr();

    const eventsByDay = {};
    events.forEach((e) => {
      const d = new Date(e.date);
      if (d.getFullYear() === year && d.getMonth() === month) {
        const day = d.getDate();
        (eventsByDay[day] = eventsByDay[day] || []).push(e);
      }
    });

    const cells = [];
    for (let i = 0; i < firstDow; i++) cells.push(null);
    for (let day = 1; day <= daysInMonth; day++) cells.push(day);

    const monthLabel = cursor.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });

    const header = h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '10px' } }, [
      h('button', { style: navBtnStyle, onClick: () => { cursor = new Date(year, month - 1, 1); renderBody(); } }, '‹'),
      h('div', { style: { fontSize: '12.5px', fontWeight: '700', color: C.ink, textTransform: 'capitalize' } }, monthLabel),
      h('button', { style: navBtnStyle, onClick: () => { cursor = new Date(year, month + 1, 1); renderBody(); } }, '›'),
    ]);
    const weekHeader = h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '3px', fontSize: '10px', color: C.slate, marginBottom: '4px', textAlign: 'center', fontWeight: '600' } },
      ['D', 'L', 'M', 'M', 'J', 'V', 'S'].map((d) => h('div', {}, d)));

    const grid = h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '3px' } },
      cells.map((day) => {
        if (day === null) return h('div', {});
        const dayKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEvents = eventsByDay[day] || [];
        const isToday = dayKey === todayKey;
        const cell = h('div', {
          title: dayEvents.map((e) => e.label).join(' · '),
          style: { aspectRatio: '1', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', borderRadius: '7px', fontSize: '11px', background: isToday ? `${C.ink}0D` : 'transparent', border: isToday ? `1px solid ${C.ink}33` : '1px solid transparent', color: dayEvents.length ? C.ink : C.slate, fontWeight: dayEvents.length ? '700' : '400' },
        }, [String(day)]);
        if (dayEvents.length > 0) {
          cell.appendChild(h('div', { style: { display: 'flex', gap: '2px', marginTop: '1px' } },
            dayEvents.slice(0, 3).map((e) => h('span', { style: { width: '5.5px', height: '5.5px', borderRadius: '50%', background: e.color || CAL.pagado } }))));
        }
        return cell;
      }));

    wrap.appendChild(header); wrap.appendChild(weekHeader); wrap.appendChild(grid);
  }
  renderBody();
  return wrap;
}

      ]),
    ]);
  }

  paint();
  return root;
}

function renderProviderManagePanel(provider, data, mutate, onClose, parentPaint) {
  const ciclo = data.ciclos.find((c) => c.providerId === provider.id && c.estado === 'abierto');

  const overlay = h('div', { style: { position: 'fixed', inset: '0', background: '#00000055', display: 'flex', justifyContent: 'flex-end', zIndex: '50' }, onClick: onClose });
  const panel = h('div', { style: { width: '480px', maxWidth: '92vw', height: '100%', background: C.paper, overflowY: 'auto', boxShadow: '-8px 0 24px #00000022' }, onClick: (e) => e.stopPropagation() });

  async function handleComprobanteFile(e) {
    const file = e.target.files[0];

    extrayendo = true; repaint();
    try {
      const r = await extraerDatosComprobante(file);
      comprobanteDataUrl = r.dataUrl;
      if (r.referencia) refComprobante = r.referencia;
      else comprobanteError = 'No detectamos la referencia automáticamente. Escríbela a mano abajo.';
      if (r.monto && Number(r.monto) !== Number(factura.monto)) {
        comprobanteError = `El comprobante dice ${formatMoney(r.monto)} y la factura es ${formatMoney(factura.monto)} — revisa antes de confirmar.`;
      }
    } catch (err) {
      comprobanteError = 'Lectura automática no disponible — escribe la referencia a mano.';
      comprobanteDataUrl = await fileToDataUrl(file).catch(() => '');
    } finally {
      extrayendo = false; repaint();
    }
  }
  async function registrarPago() {
    if (!refComprobante) return;
    const referencia = refComprobante;
    const archivo = comprobanteFile ? { nombre: comprobanteFile.name, data: comprobanteDataUrl } : undefined;
    showComprobante = false; refComprobante = ''; comprobanteFile = null; comprobanteDataUrl = ''; comprobanteError = '';

  }

      h('div', { style: { fontFamily: 'Space Grotesk, sans-serif', fontWeight: '700', fontSize: '19px' } }, provider.nombre),
      h('div', { style: { fontSize: '12.5px', opacity: '0.7', marginTop: '2px' } }, `${provider.email} · RFC ${provider.rfc}`),
      h('div', { style: { display: 'flex', gap: '8px', marginTop: '10px', flexWrap: 'wrap' } }, [
        EsquemaBadge(provider.esquema),
        h('span', { style: { fontSize: '11.5px', opacity: '0.75', display: 'flex', alignItems: 'center', gap: '4px' } }, [Icon(provider.docs.csf ? 'file-check' : 'file-x', 12), ' CSF']),
        h('span', { style: { fontSize: '11.5px', opacity: '0.75', display: 'flex', alignItems: 'center', gap: '4px' } }, [Icon(provider.docs.caratula ? 'file-check' : 'file-x', 12), ' Carátula']),
      ]),
    ]);

    const body = h('div', { style: { padding: '22px' } });
    body.appendChild(h('div', { style: { fontSize: '13px', color: C.slate, marginBottom: '6px', lineHeight: '1.5' } }, meta.desc(provider)));
    body.appendChild(h('div', { style: { fontSize: '12px', color: C.slate, marginBottom: '18px' } }, `Crédito: ${provider.diasCredito} días desde aprobación · ${provider.condiciones || 'Sin condiciones especiales.'}`));

    body.appendChild(SectionTitle('calendar-time', 'Ciclo actual'));
    const cicloCard = h('div', { style: { background: C.card, border: `1px solid ${C.line}`, borderRadius: '10px', padding: '16px', marginBottom: '22px' } });
    cicloCard.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '8px' } }, [h('span', { style: { fontSize: '12.5px', color: C.slate } }, 'Corte'), VencimientoChip(ciclo.fechaVencimiento)]));
    cicloCard.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '12px' } }, [
      h('span', { style: { fontSize: '12.5px', color: C.slate } }, ciclo.habilitado ? 'Monto habilitado · IVA incluido' : 'Monto sugerido · IVA incluido'),
      h('span', { style: { fontFamily: 'JetBrains Mono, monospace', fontWeight: '700', fontSize: '19px', color: C.ink } }, formatMoney(ciclo.habilitado ? ciclo.monto : sugerido)),
    ]));
    if (ciclo.habilitado && ciclo.autoHabilitado) {

      cicloCard.appendChild(h('button', { style: { ...linkBtnStyle, marginTop: '10px', justifyContent: 'center', width: '100%' }, onClick: forzarCorteAhora }, [Icon('bolt', 12), ' Forzar corte automático ahora (demo)']));
    }
    body.appendChild(cicloCard);

    if (necesitaRegistros) {
      body.appendChild(SectionTitle('tool', 'Servicios registrados este ciclo'));

      registros.forEach((r) => {
        regWrap.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: `1px solid ${C.line}` } }, [
          h('div', {}, [h('div', { style: { fontSize: '13px', color: C.ink } }, r.descripcion), h('div', { style: { fontSize: '11.5px', color: C.slate } }, formatDate(r.fecha))]),
          h('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: '13px', fontWeight: '600' } }, formatMoney(r.monto)),
        ]));
      });
      if (provider.esquema === 'variable_con_tope') regWrap.appendChild(h('div', { style: { fontSize: '11.5px', color: C.plum, marginTop: '8px' } }, `Tope del ciclo: ${formatMoney(provider.tope)}`));
      if (showAddRegistro) {
        const descInput = h('input', { style: inputStyle, placeholder: 'Ej. Servicio de frenos – unidad 204' });
        const montoInput = h('input', { style: inputStyle, type: 'number' });
        const formBox = h('div', { style: { marginTop: '12px', background: C.card, border: `1px solid ${C.line}`, borderRadius: '10px', padding: '14px' } }, [
          Field('Descripción', descInput),
          Field('Monto, IVA incluido (MXN)', montoInput),
          h('div', { style: { display: 'flex', gap: '8px' } }, [
            Btn('Guardar', { onClick: () => {
              if (!descInput.value || !montoInput.value) return;
              showAddRegistro = false;
              mutate('agregarRegistro', { providerId: provider.id, cicloId: ciclo.id, descripcion: descInput.value, monto: Number(montoInput.value) });
            } }),
            Btn('Cancelar', { variant: 'ghost', onClick: () => { showAddRegistro = false; repaint(); } }),
          ]),
        ]);
        regWrap.appendChild(formBox);
      } else {

      }
      body.appendChild(regWrap);
    }

    body.appendChild(SectionTitle('file-text', 'Factura de este ciclo'));
    const facWrap = h('div', { style: { marginBottom: '22px' } });
    if (!factura) {
      facWrap.appendChild(h('div', { style: { fontSize: '12.5px', color: C.slate } }, 'El proveedor todavía no sube su factura.'));
    } else {
      const card = h('div', { style: { background: C.card, border: `1px solid ${C.line}`, borderRadius: '10px', padding: '14px' } });
      card.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '8px' } }, [h('span', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: '13px' } }, `Folio ${factura.folio}`), EstadoFacturaTag(factura.estado)]));
      card.appendChild(h('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontWeight: '700', fontSize: '18px', marginBottom: '4px' } }, formatMoney(factura.monto)));
      card.appendChild(h('div', { style: { fontSize: '11.5px', color: C.slate, marginBottom: '6px' } }, `Subida el ${formatDate(factura.fecha)}`));
      if (factura.pdf || factura.xml) {
        const row = h('div', { style: { display: 'flex', gap: '14px', marginBottom: '8px' } });
        if (factura.pdf) row.appendChild(h('a', { href: factura.pdf.url, target: '_blank', rel: 'noopener', style: { fontSize: '12px', color: C.teal, display: 'flex', alignItems: 'center', gap: '4px' } }, [Icon('file-text', 13), ' Ver PDF']));
        if (factura.xml) row.appendChild(h('a', { href: factura.xml.url, target: '_blank', rel: 'noopener', style: { fontSize: '12px', color: C.teal, display: 'flex', alignItems: 'center', gap: '4px' } }, [Icon('file-text', 13), ' Ver XML']));
        if (!factura.pdf || !factura.xml) row.appendChild(h('span', { style: { fontSize: '11.5px', color: C.red, display: 'flex', alignItems: 'center', gap: '4px' } }, [Icon('alert-triangle', 12), ` Falta ${!factura.pdf ? 'PDF' : 'XML'}`]));
        card.appendChild(row);
      }
      if (factura.fechaPagoProgramada && factura.estado !== 'pagada') {
        card.appendChild(h('div', { style: { fontSize: '12.5px', color: C.gold, marginBottom: '8px' } }, `Pago programado: ${formatDate(factura.fechaPagoProgramada)} (${provider.diasCredito}d de crédito)`));
      }
      if (factura.nota) card.appendChild(h('div', { style: { fontSize: '12.5px', color: C.slate, marginBottom: '10px', fontStyle: 'italic' } }, `"${factura.nota}"`));
      const actions = h('div', { style: { display: 'flex', gap: '8px', marginTop: '6px', flexWrap: 'wrap' } });

      if (factura.estado === 'aprobada' && !showComprobante) actions.appendChild(Btn('Subir comprobante y marcar pagada', { variant: 'gold', icon: 'receipt', onClick: () => { showComprobante = true; repaint(); } }));
      card.appendChild(actions);
      if (factura.estado === 'aprobada' && showComprobante) {
        const compWrap = h('div', { style: { marginTop: '10px' } });
        const fileInput = h('input', { style: inputStyle, type: 'file', accept: 'application/pdf,image/*' });
        fileInput.addEventListener('change', handleComprobanteFile);
        compWrap.appendChild(Field('Comprobante de pago (PDF o imagen)', fileInput, 'Sube tu comprobante de SPEI/transferencia.'));
        if (extrayendo) compWrap.appendChild(h('div', { style: { fontSize: '12.5px', color: C.slate, marginBottom: '10px' } }, 'Leyendo el comprobante…'));
        if (comprobanteError) compWrap.appendChild(h('div', { style: { color: C.red, fontSize: '12.5px', marginBottom: '10px' } }, comprobanteError));
        if (!extrayendo && comprobanteFile) {
          const refInput = h('input', { style: inputStyle, value: refComprobante, placeholder: 'SPEI-00231' });
          refInput.addEventListener('input', (e) => { refComprobante = e.target.value; confirmBtn.disabled = !refComprobante; confirmBtn.style.opacity = refComprobante ? '1' : '0.45'; confirmBtn.style.cursor = refComprobante ? 'pointer' : 'not-allowed'; });
          compWrap.appendChild(Field('Referencia detectada', refInput, 'Revísala — puedes corregirla si hace falta.'));
        }
        var confirmBtn = Btn('Confirmar pago', { variant: 'gold', disabled: extrayendo || !refComprobante, onClick: registrarPago });
        compWrap.appendChild(h('div', { style: { display: 'flex', gap: '8px' } }, [
          confirmBtn,
          Btn('Cancelar', { variant: 'ghost', onClick: () => { showComprobante = false; comprobanteFile = null; comprobanteDataUrl = ''; refComprobante = ''; comprobanteError = ''; repaint(); } }),
        ]));
        card.appendChild(compWrap);
      }
      facWrap.appendChild(card);
    }
    body.appendChild(facWrap);

    body.appendChild(SectionTitle('history', 'Historial de pagos'));
    if (historial.length === 0) {
      body.appendChild(h('div', { style: { fontSize: '12.5px', color: C.slate } }, 'Sin pagos previos.'));
    } else {
      historial.forEach((f) => {
        body.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '12.5px', padding: '7px 0', borderBottom: `1px solid ${C.line}` } }, [
          h('span', { style: { color: C.slate } }, `${formatDate(f.comprobante?.fecha || f.fecha)} · ${f.folio} · ref. ${f.comprobante?.referencia || '—'}`),
          h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px' } }, [
            h('span', { style: { fontFamily: 'JetBrains Mono, monospace', fontWeight: '600' } }, formatMoney(f.monto)),
            f.comprobante?.archivo ? h('a', { href: f.comprobante.archivo.url, target: '_blank', rel: 'noopener', style: { color: C.teal, display: 'flex', alignItems: 'center' } }, [Icon('receipt', 13)]) : null,
          ]),
        ]));
      });
    }

    const wrap = h('div', {});
    wrap.appendChild(head); wrap.appendChild(body);
    return wrap;
  }

  panel.appendChild(buildBody());
  return overlay;
}

function renderAdminApp(data, onLogout, onRefresh) {
  const root = h('div', { style: { minHeight: '100%', background: C.paper } });
  let openId = null;
  let showNuevo = false;
  let providerSearch = '';

  let busy = false;
  function paint() {
    clear(root);
    root.appendChild(build());
  }
  async function mutate(accion, payload) {
    if (busy) return;
    busy = true;
    try {
      await api.post(accion, payload);
      const fresh = await api.get();
      data.providers = fresh.providers; data.ciclos = fresh.ciclos; data.registros = fresh.registros; data.facturas = fresh.facturas;
    } catch (err) {
      alert('No se pudo guardar: ' + (err.message || 'intenta de nuevo.'));
    } finally {
      busy = false; paint();
    }
  }

  function openManage(id) { openId = id; paint(); }
  function closeManage() { openId = null; paint(); }

  function build() {
    const ciclosAbiertos = data.ciclos.filter((c) => c.estado === 'abierto');
    const kpis = {
      proveedores: data.providers.length,
      habilitados: ciclosAbiertos.filter((c) => c.habilitado).length,
      enRevision: data.facturas.filter((f) => f.estado === 'en_revision').length,
      proximos: ciclosAbiertos.filter((c) => { const d = daysUntil(c.fechaVencimiento); return d !== null && d <= 5; }).length,
    };

    const eventosCalendario = [];
    ciclosAbiertos.forEach((c) => {
      const p = data.providers.find((p) => p.id === c.providerId);
      const f = data.facturas.find((f) => f.cicloId === c.id);
      if (!p) return;
      if (f) {
        const fechaPago = f.fechaPagoProgramada || c.fechaVencimiento;
        eventosCalendario.push({ date: fechaPago, label: `${p.nombre} · día de pago · ${formatMoney(f.monto)}`, color: f.estado === 'pagada' ? CAL.pagado : CAL.pago });
      } else {
        eventosCalendario.push({ date: c.fechaVencimiento, label: `${p.nombre} · corte de ciclo (sin factura aún)`, color: CAL.sin });
      }
    });
    const proximosEventos = eventosCalendario
      .filter((e) => daysUntil(e.date) !== null && daysUntil(e.date) >= -3)
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    const container = h('div', { style: { minHeight: '100%', background: C.paper } });

    inner.appendChild(h('div', { style: { background: `${C.gold}10`, border: `1px solid ${C.gold}33`, borderRadius: '10px', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '22px', fontSize: '12.5px', color: C.gold } }, [Icon('receipt', 14), ` ${NOTA_IVA}`]));

      const factura = data.facturas.find((f) => f.cicloId === ciclo?.id);
      const sugerido = montoSugerido(p, ciclo, data.registros);
      const row = h('div', { style: { background: C.card, border: `1px solid ${C.line}`, borderRadius: '12px', padding: '16px 18px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '16px' }, onClick: () => openManage(p.id) }, [
        h('div', { style: { width: '38px', height: '38px', borderRadius: '9px', background: p.tipo === 'taller' ? `${C.teal}14` : `${C.ink}0D`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: '0' } }, [Icon(p.tipo === 'taller' ? 'tool' : 'truck', 17, p.tipo === 'taller' ? C.teal : C.ink)]),
        h('div', { style: { flex: '1', minWidth: '0' } }, [
          h('div', { style: { fontWeight: '600', fontSize: '14.5px', color: C.ink } }, p.nombre),
          h('div', { style: { fontSize: '12px', color: C.slate, marginTop: '2px' } }, `${p.email} · ${p.diasCredito}d crédito`),
        ]),
        EsquemaBadge(p.esquema, 'sm'),
        h('div', { style: { width: '140px', textAlign: 'right' } }, [
          h('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontWeight: '700', fontSize: '14px', color: ciclo?.habilitado ? C.ink : C.slate } }, ciclo?.habilitado ? formatMoney(ciclo.monto) : `sug. ${formatMoney(sugerido)}`),
          VencimientoChip(ciclo?.fechaVencimiento),
        ]),
        h('div', { style: { width: '110px' } }, [EstadoFacturaTag(factura ? factura.estado : 'sin_factura')]),
        Icon('chevron-right', 16, C.slate),
      ]);
      list.appendChild(row);
      rowEntries.push({ el: row, text: [p.nombre, p.email, p.ciudad, p.rfc].filter(Boolean).join(' ').toLowerCase() });
    });
    function applyProviderFilter() {
      const q = providerSearch.trim().toLowerCase();
      let visibleCount = 0;
      rowEntries.forEach(({ el, text }) => {
        const match = !q || text.includes(q);
        el.style.display = match ? '' : 'none';
        if (match) visibleCount++;
      });
      noMatch.style.display = visibleCount === 0 ? 'block' : 'none';
    }
    searchInput.addEventListener('input', (e) => { providerSearch = e.target.value; applyProviderFilter(); });
    applyProviderFilter();
    inner.appendChild(searchInput);
    inner.appendChild(noMatch);
    inner.appendChild(list);
    container.appendChild(inner);

    const provider = data.providers.find((p) => p.id === openId);
    if (provider) container.appendChild(renderProviderManagePanel(provider, data, mutate, closeManage, paint));
    if (showNuevo) container.appendChild(renderNuevoProveedorForm(() => { showNuevo = false; paint(); }, (nuevo) => {
      showNuevo = false;
      mutate('nuevoProveedor', nuevo);
    }));

    return container;
  }

  paint();
  return root;
}

/* ================= ALTA DE PROVEEDOR ================= */
function renderNuevoProveedorForm(onClose, onSave) {

    nombre: '', email: '', ciudad: '', tipo: 'externo', rfc: '', diasCredito: 15,
    esquema: 'por_servicio', montoFijo: '', tope: '', diasCiclo: 30, condiciones: '',
    cuenta: '', password: '', docs: { csf: false, caratula: false },

    panel.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '16px' } }, [
      h('div', { style: { fontFamily: 'Space Grotesk, sans-serif', fontWeight: '700', fontSize: '18px', color: C.ink } }, 'Nuevo proveedor'),

    const emailInput = h('input', { style: inputStyle, value: f.email, placeholder: 'contacto@proveedor.mx' }); emailInput.addEventListener('input', (e) => f.email = e.target.value);
    const rfcInput = h('input', { style: inputStyle, value: f.rfc }); rfcInput.addEventListener('input', (e) => f.rfc = e.target.value);
    const ciudadInput = h('input', { style: inputStyle, value: f.ciudad }); ciudadInput.addEventListener('input', (e) => f.ciudad = e.target.value);

    panel.appendChild(Field('Nombre o razón social', nombreInput));
    panel.appendChild(Field('Correo de acceso al portal', emailInput));
    panel.appendChild(h('div', { style: { display: 'flex', gap: '10px' } }, [

    tipoSelect.value = f.tipo; tipoSelect.addEventListener('change', (e) => f.tipo = e.target.value);
    panel.appendChild(Field('Tipo', tipoSelect));

    const esquemaSelect = h('select', { style: inputStyle }, Object.entries(ESQUEMAS).map(([k, v]) => h('option', { value: k }, v.label)));
    esquemaSelect.value = f.esquema;
    esquemaSelect.addEventListener('change', (e) => { f.esquema = e.target.value; repaint(); });
    panel.appendChild(Field('Esquema de pago', esquemaSelect));

    if (f.esquema === 'fijo') {
      const montoFijoInput = h('input', { style: inputStyle, type: 'number', value: f.montoFijo }); montoFijoInput.addEventListener('input', (e) => f.montoFijo = e.target.value);
      panel.appendChild(Field('Monto fijo por ciclo, IVA incluido (MXN)', montoFijoInput));
    }
    if (f.esquema === 'variable_con_tope') {
      const topeInput = h('input', { style: inputStyle, type: 'number', value: f.tope }); topeInput.addEventListener('input', (e) => f.tope = e.target.value);
      panel.appendChild(Field('Tope por ciclo, IVA incluido (MXN)', topeInput));
    }

    const diasCicloInput = h('input', { style: inputStyle, type: 'number', value: f.diasCiclo }); diasCicloInput.addEventListener('input', (e) => f.diasCiclo = e.target.value);
    const diasCreditoInput = h('input', { style: inputStyle, type: 'number', value: f.diasCredito }); diasCreditoInput.addEventListener('input', (e) => f.diasCredito = e.target.value);
    panel.appendChild(h('div', { style: { display: 'flex', gap: '10px' } }, [

  }

  build();
  return overlay;

/* ================= PROVEEDOR ================= */
function renderProviderApp(provider, data, onLogout, onRefresh) {
  const root = h('div', { style: { minHeight: '100%', background: C.paper } });
  let showForm = false;
  let fileError = '';
  let enviando = false;
  let busy = false;

  function paint() { clear(root); root.appendChild(build()); }
  async function mutate(accion, payload) {
    if (busy) return;
    busy = true;
    try {
      await api.post(accion, payload);
      const fresh = await api.get();
      data.providers = fresh.providers; data.ciclos = fresh.ciclos; data.registros = fresh.registros; data.facturas = fresh.facturas;
    } catch (err) {
      alert('No se pudo enviar: ' + (err.message || 'intenta de nuevo.'));
    } finally {
      busy = false; paint();
    }
  }

  function build() {
    const ciclo = data.ciclos.find((c) => c.providerId === provider.id && c.estado === 'abierto');
    const factura = data.facturas.find((f) => f.cicloId === ciclo?.id);
    const meta = ESQUEMAS[provider.esquema];
    const historial = data.facturas.filter((f) => f.providerId === provider.id).sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

    const container = h('div', { style: { minHeight: '100%', background: C.paper } });
    container.appendChild(TopBar(provider.nombre, `Portal de proveedor · ${provider.email}`, onLogout, onRefresh));

    const inner = h('div', { style: { maxWidth: '560px', margin: '0 auto', padding: '28px 20px 60px' } });
    inner.appendChild(h('div', { style: { background: `${C.gold}10`, border: `1px solid ${C.gold}33`, borderRadius: '10px', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '16px', fontSize: '12.5px', color: C.gold } }, [Icon('receipt', 14), ` ${NOTA_IVA}`]));

    const esquemaCard = h('div', { style: { background: C.card, border: `1px solid ${C.line}`, borderRadius: '12px', padding: '18px', marginBottom: '16px' } });
    esquemaCard.appendChild(SectionTitle(meta.icon, 'Tu esquema de pago'));
    esquemaCard.appendChild(EsquemaBadge(provider.esquema));
    esquemaCard.appendChild(h('div', { style: { fontSize: '13px', color: C.slate, marginTop: '10px', lineHeight: '1.5' } }, meta.desc(provider)));
    esquemaCard.appendChild(h('div', { style: { fontSize: '12px', color: C.slate, marginTop: '6px' } }, `Crédito: ${provider.diasCredito} días desde que se aprueba tu factura.`));
    inner.appendChild(esquemaCard);

    const cicloCard = h('div', { style: { background: C.card, border: `1px solid ${C.line}`, borderRadius: '12px', padding: '18px', marginBottom: '16px' } });
    cicloCard.appendChild(SectionTitle('calendar-time', 'Ciclo actual'));
    if (!ciclo?.habilitado) {
      cicloCard.appendChild(h('div', { style: { fontSize: '13px', color: C.slate, lineHeight: '1.5' } }, 'Autolab aún no habilita un monto para este ciclo. En cuanto registre tus servicios y se cumpla la fecha de corte, podrás subir tu factura aquí.'));
    } else {
      cicloCard.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '6px' } }, [
        h('span', { style: { fontSize: '12.5px', color: C.slate } }, 'Monto habilitado · IVA incluido'),
        h('span', { style: { fontFamily: 'JetBrains Mono, monospace', fontWeight: '700', fontSize: '22px', color: C.ink } }, formatMoney(ciclo.monto)),
      ]));
      cicloCard.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between' } }, [h('span', { style: { fontSize: '12.5px', color: C.slate } }, 'Corte'), VencimientoChip(ciclo.fechaVencimiento)]));
    }
    const calBox = h('div', { style: { marginTop: '14px', paddingTop: '14px', borderTop: `1px solid ${C.line}`, maxWidth: '260px' } });
    const calEvents = factura
      ? [{ date: factura.fechaPagoProgramada || ciclo?.fechaVencimiento, label: `Tu día de pago · ${formatMoney(factura.monto)}`, color: factura.estado === 'pagada' ? CAL.pagado : CAL.pago }]
      : (ciclo?.fechaVencimiento ? [{ date: ciclo.fechaVencimiento, label: 'Corte de tu ciclo (sin factura aún)', color: CAL.sin }] : []);
    calBox.appendChild(MiniCalendar(calEvents));
    cicloCard.appendChild(calBox);
    inner.appendChild(cicloCard);

    const facCard = h('div', { style: { background: C.card, border: `1px solid ${C.line}`, borderRadius: '12px', padding: '18px', marginBottom: '24px' } });
    facCard.appendChild(SectionTitle('file-text', 'Tu factura'));
    if (!ciclo?.habilitado && !factura) {
      facCard.appendChild(h('div', { style: { fontSize: '12.5px', color: C.slate } }, 'Disponible cuando Autolab habilite el pago de este ciclo.'));
    } else if (!factura || factura.estado === 'rechazada') {
      if (factura?.estado === 'rechazada') facCard.appendChild(h('div', { style: { background: `${C.red}10`, border: `1px solid ${C.red}33`, borderRadius: '8px', padding: '8px 10px', fontSize: '12.5px', color: C.red, marginBottom: '12px' } }, 'Tu factura anterior fue rechazada. Revisa los datos y vuelve a subirla.'));
      if (!showForm) {
        facCard.appendChild(Btn('Subir factura', { full: true, variant: 'gold', icon: 'upload', onClick: () => { showForm = true; paint(); } }));
      } else {
        const folioInput = h('input', { style: inputStyle, placeholder: 'Ej. F-1042' });
        const montoInput = h('input', { style: inputStyle, type: 'number', value: ciclo?.habilitado ? ciclo.monto : '' });
        const pdfInput = h('input', { style: inputStyle, type: 'file', accept: 'application/pdf' });
        const xmlInput = h('input', { style: inputStyle, type: 'file', accept: '.xml,text/xml,application/xml' });
        const notaInput = h('input', { style: inputStyle });
        const errorBox = h('div', { style: { color: C.red, fontSize: '12.5px', marginBottom: '10px', display: fileError ? 'block' : 'none' } }, fileError);
        const formBox = h('div', {}, [
          Field('Folio de factura', folioInput),
          Field('Monto, IVA incluido (MXN)', montoInput),
          Field('Factura en PDF', pdfInput, 'Representación impresa de tu CFDI.'),
          Field('Archivo XML (CFDI)', xmlInput, 'El timbrado fiscal — sin este archivo tu factura no es válida en México.'),
          Field('Nota (opcional)', notaInput),
          errorBox,
          h('div', { style: { display: 'flex', gap: '8px' } }, [
            Btn(enviando ? 'Subiendo…' : 'Enviar factura', { disabled: enviando, onClick: async () => {
              fileError = '';
              const pdfFile = pdfInput.files[0], xmlFile = xmlInput.files[0];
              if (!folioInput.value || !montoInput.value) return;
              if (!pdfFile || !xmlFile) { fileError = 'En México toda factura necesita su PDF y su XML (CFDI). Sube los dos archivos.'; paint(); return; }
              if (pdfFile.size > MAX_FILE_MB * 1024 * 1024 || xmlFile.size > MAX_FILE_MB * 1024 * 1024) { fileError = `Cada archivo debe pesar menos de ${MAX_FILE_MB}MB.`; paint(); return; }
              enviando = true; paint();
              try {
                const pdfData = await fileToDataUrl(pdfFile);
                const xmlData = await fileToDataUrl(xmlFile);
                showForm = false;
                await mutate('subirFactura', {
                  providerId: provider.id, cicloId: ciclo.id, folio: folioInput.value, monto: Number(montoInput.value), nota: notaInput.value,
                  pdf: { nombre: pdfFile.name, data: pdfData }, xml: { nombre: xmlFile.name, data: xmlData },
                });
              } finally {
                enviando = false;
              }
            } }),
            Btn('Cancelar', { variant: 'ghost', disabled: enviando, onClick: () => { showForm = false; paint(); } }),
          ]),
        ]);
        facCard.appendChild(formBox);
      }
    } else {
      const card = h('div', {});
      card.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '8px' } }, [h('span', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: '13px' } }, `Folio ${factura.folio}`), EstadoFacturaTag(factura.estado)]));
      card.appendChild(h('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontWeight: '700', fontSize: '18px' } }, formatMoney(factura.monto)));
      card.appendChild(h('div', { style: { fontSize: '11.5px', color: C.slate, marginTop: '4px' } }, `Subida el ${formatDate(factura.fecha)}`));
      if (factura.pdf || factura.xml) {
        const row = h('div', { style: { display: 'flex', gap: '14px', marginTop: '8px' } });
        if (factura.pdf) row.appendChild(h('a', { href: factura.pdf.url, target: '_blank', rel: 'noopener', style: { fontSize: '12px', color: C.teal, display: 'flex', alignItems: 'center', gap: '4px' } }, [Icon('file-text', 13), ' PDF']));
        if (factura.xml) row.appendChild(h('a', { href: factura.xml.url, target: '_blank', rel: 'noopener', style: { fontSize: '12px', color: C.teal, display: 'flex', alignItems: 'center', gap: '4px' } }, [Icon('file-text', 13), ' XML']));
        card.appendChild(row);
      }
      if (factura.estado === 'en_revision') card.appendChild(h('div', { style: { fontSize: '12.5px', color: C.gold, marginTop: '8px' } }, 'Autolab está revisando tu factura.'));
      if (factura.estado === 'aprobada') card.appendChild(h('div', { style: { fontSize: '12.5px', color: C.teal, marginTop: '8px' } }, `Aprobada. Pago programado para el ${formatDate(factura.fechaPagoProgramada)}.`));
      if (factura.estado === 'pagada') {
        card.appendChild(h('div', { style: { fontSize: '12.5px', color: C.teal, marginTop: '8px', display: 'flex', alignItems: 'center', gap: '6px' } }, [
          Icon('receipt', 13), ` Pagada el ${formatDate(factura.comprobante?.fecha)} · comprobante ${factura.comprobante?.referencia}`,
          factura.comprobante?.archivo ? h('a', { href: factura.comprobante.archivo.url, target: '_blank', rel: 'noopener', style: { color: C.teal, marginLeft: '4px' } }, '(ver archivo)') : null,
        ]));
      }
      facCard.appendChild(card);
    }
    inner.appendChild(facCard);

    inner.appendChild(SectionTitle('history', 'Tu historial'));
    if (historial.length === 0) {
      inner.appendChild(h('div', { style: { fontSize: '12.5px', color: C.slate } }, 'Sin facturas previas.'));
    } else {
      historial.forEach((f) => {
        const links = h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } });
        if (f.pdf) links.appendChild(h('a', { href: f.pdf.url, target: '_blank', rel: 'noopener', title: 'Descargar PDF', style: { color: C.teal, display: 'flex', alignItems: 'center' } }, [Icon('file-text', 14)]));
        if (f.xml) links.appendChild(h('a', { href: f.xml.url, target: '_blank', rel: 'noopener', title: 'Descargar XML', style: { color: C.slate, display: 'flex', alignItems: 'center' } }, [Icon('file-text', 14)]));
        if (f.comprobante?.archivo) links.appendChild(h('a', { href: f.comprobante.archivo.url, target: '_blank', rel: 'noopener', title: 'Descargar comprobante de pago', style: { color: C.gold, display: 'flex', alignItems: 'center' } }, [Icon('receipt', 14)]));
        inner.appendChild(h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '12.5px', padding: '7px 0', borderBottom: `1px solid ${C.line}` } }, [
          h('span', { style: { color: C.slate } }, `${formatDate(f.fecha)} · ${f.folio}`),
          h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px' } }, [h('span', { style: { fontFamily: 'JetBrains Mono, monospace', fontWeight: '600' } }, formatMoney(f.monto)), EstadoFacturaTag(f.estado), links]),
        ]));
      });
    }

    container.appendChild(inner);
    return container;
  }

  paint();
  return root;
}

/* ================= APP ROOT ================= */
const SESSION_KEY = 'autolab-portal-session-v1';
function loadSession() { try { const raw = localStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; } }
function saveSession(s) { try { if (s) localStorage.setItem(SESSION_KEY, JSON.stringify(s)); else localStorage.removeItem(SESSION_KEY); } catch (e) {} }

function mountApp() {
  const rootEl = document.getElementById('portal-root');
  let session = loadSession();

  function showLoading(msg) {
    clear(rootEl);
    rootEl.appendChild(h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', minHeight: '500px', color: C.slate, fontSize: '13px' } }, msg || 'Cargando…'));
  }
  function showError(msg, retry) {
    clear(rootEl);
    rootEl.appendChild(h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', minHeight: '500px', gap: '14px', padding: '24px', textAlign: 'center' } }, [
      h('div', { style: { color: C.red, fontSize: '13.5px', maxWidth: '360px' } }, msg),
      Btn('Reintentar', { onClick: retry }),
    ]));
  }
  function paintLogin() {
    clear(rootEl);
    rootEl.appendChild(renderLogin([], (s) => { session = s; saveSession(s); enterApp(); }));
  }
  async function enterApp() {
    showLoading('Cargando datos…');
    let data;
    try {
      data = await api.get();
    } catch (err) {
      showError(err.message || 'No se pudo conectar con el servidor. Revisa tu conexión e intenta de nuevo.', enterApp);
      return;
    }
    clear(rootEl);
    if (session.role === 'admin') {
      rootEl.appendChild(renderAdminApp(data, () => { session = null; saveSession(null); paintLogin(); }, enterApp));
    } else {
      const provider = data.providers.find((p) => p.id === session.providerId);
      if (!provider) { session = null; saveSession(null); paintLogin(); return; }
      rootEl.appendChild(renderProviderApp(provider, data, () => { session = null; saveSession(null); paintLogin(); }, enterApp));
    }
  }

  if (session) enterApp(); else paintLogin();
}

document.addEventListener('DOMContentLoaded', mountApp);
</script>
